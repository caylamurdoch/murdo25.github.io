<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Ben Murdoch — OG Image</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:        #f6f2ea;
    --rule:         #d9d0bd;
    --ink:          #1a1814;
    --ink-soft:     #4a443a;
    --ink-muted:    #7a7264;
    --ember:        #8a3a1f;
    --serif: 'EB Garamond', 'Garamond', 'Georgia', serif;
    --mono:  'JetBrains Mono', 'SF Mono', 'Menlo', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
  }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--serif);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background-image:
      radial-gradient(rgba(80, 60, 30, 0.025) 1px, transparent 1px),
      radial-gradient(rgba(80, 60, 30, 0.018) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 2px;
    border: 1px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 72px;
    padding: 80px 96px;
  }

  .photo {
    width: 320px;
    height: 320px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid var(--rule);
    box-shadow: 0 4px 20px rgba(26, 24, 20, 0.08);
    flex-shrink: 0;
  }

  .text {
    flex: 1;
    min-width: 0;
  }

  .name {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 100px;
    line-height: 1.0;
    letter-spacing: -0.015em;
    color: var(--ink);
    margin-bottom: 28px;
    white-space: nowrap;
  }

  .tagline {
    font-family: var(--serif);
    font-size: 28px;
    line-height: 1.42;
    color: var(--ink-soft);
    margin-bottom: 36px;
    max-width: 620px;
  }

  .tagline em {
    font-style: italic;
    color: var(--ink-soft);
  }

  .locus {
    font-family: var(--mono);
    font-size: 16px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-muted);
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--ember);
    box-shadow: 0 0 0 4px rgba(138, 58, 31, 0.15);
  }
</style>
</head>
<body>
  <img class="photo" src="profile.jpg" alt="Ben Murdoch" />
  <div class="text">
    <h1 class="name">Ben Murdoch</h1>
    <p class="tagline">
      Senior Research Engineer at <em>Google Labs</em>. Working on agent
      architecture, evaluation, and the responsible-AI launch path
      for language applications.
    </p>
    <p class="locus">
      <span class="dot"></span>
      San Francisco, CA
    </p>
  </div>
</body>
</html>
